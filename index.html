<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>knotCollective</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            height: auto;
            min-height: 100%;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: transparent;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-left {
            display: flex;
            gap: 3rem;
        }
        .nav-left a {
            text-decoration: none;
            color: #ffffff;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .nav-left a:hover {
            opacity: 0.5;
        }
        .nav-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-right a {
            color: #ffffff;
            transition: opacity 0.2s;
        }
        .nav-right a:hover {
            opacity: 0.5;
        }
        .nav-right svg {
            width: 16px;
            height: 16px;
        }
        .hero {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
        }
        .hero iframe {
            margin-top: 2rem;
        }
        .content-scroll {
            padding: 4rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }
        .content-scroll img,
        .content-scroll video {
            max-width: 600px;
            width: 100%;
        }
        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }
            .nav-left {
                gap: 1.5rem;
            }
            .nav-left a {
                font-size: 0.6rem;
                letter-spacing: 0.1em;
            }
            .nav-right {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="projects.html">Projects</a>
            <a href="archive.html">Archive</a>
            <a href="about.html">About</a>
        </div>
        <div class="nav-right">
            <a href="https://instagram.com/" target="_blank" aria-label="Instagram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="20" height="20" rx="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="18" cy="6" r="1"/>
                </svg>
            </a>
            <a href="mailto:knot.collective.wien@gmail.com" aria-label="Email">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M2 4l10 8 10-8"/>
                </svg>
            </a>
        </div>
    </nav>
    <div class="content-scroll">
        <img src="/Users/ettorebiagi/Desktop/knot logo.png" alt="Knot Logo">
        <video src="/Users/ettorebiagi/Desktop/video knot logo.mov" controls></video>
    </div>
    <div class="hero">
        <img src="portrait 1 screenshot.png" alt="KNOT">
        <h2 style="font-family: 'Courier New', monospace; font-weight: normal; font-size: 0.7rem; letter-spacing: 0.2em; margin-top: 2rem; text-transform: uppercase;">Latest Release</h2>
        <iframe style="border: 0; width: 250px; height: 392px; margin-top: 1rem;" src="https://bandcamp.com/EmbeddedPlayer/album=4177057069/size=large/bgcol=333333/linkcol=e99708/tracklist=false/transparent=true/" seamless><a href="https://knot1.bandcamp.com/album/-">_ | by knot</a></iframe>
    </div>
</body>
</html>
